name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: test-key
      VITE_CONVEX_URL: https://example.convex.cloud
      VITE_WORKOS_CLIENT_ID: test-client-id

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify grounding memory
        if: always()
        run: pnpm memory:check

      - name: Lint
        if: always()
        run: pnpm lint

      - name: Typecheck
        if: always()
        run: pnpm typecheck

      - name: Test
        if: always()
        run: pnpm test:run

      - name: Build
        if: always()
        run: pnpm build
